name: Odoo CI/CD develop Pipeline

on:
  push:
    branches:
      - Development  

jobs:
  build:
    name: Build & Test Odoo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker compose build

      - name: Test Docker Compose
        run: |
          docker compose up -d
          sleep 10  # Wacht tot services opstarten
          docker ps  # Controleer draaiende containers
          docker inspect --format='{{json .State.Health}}' $(docker ps -q) | jq
          docker compose down  # Stop containers na test
