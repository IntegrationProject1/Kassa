name: Odoo CI/CD feature Pipeline

on:
  push:
    branches: [ Feature-Mathis, Feature-Daniel, Feature-Milan, Feature-Jorn, Feature-Jente ]  

jobs:
  build:
    name: Build Odoo
    runs-on: self-hosted 
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load environment variables from .env
        run: export $(grep -v '^#' /home/ehbstudent/.env | xargs)

      - name: Build Docker Image
        run: docker compose --env-file /home/ehbstudent/.env build

      - name: Test Docker Compose
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10
          docker ps
          docker inspect --format='{{json .State.Health}}' $(docker ps -q) | jq
          docker compose down

  test:
    name: Run User Delete Tests
    needs: build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start containers for testing
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10  # geef containers tijd om op te starten

      - name: Install dependencies
        run: |
          docker compose --env-file /home/ehbstudent/.env exec -T odoo pip3 install --break-system-packages mock lxml

      - name: Create test database
        run: |
          # Create test database
          docker compose --env-file /home/ehbstudent/.env exec -T db psql -U odoo -c "DROP DATABASE IF EXISTS test_db;" postgres
          docker compose --env-file /home/ehbstudent/.env exec -T db psql -U odoo -c "CREATE DATABASE test_db OWNER odoo;" postgres

      - name: Initialize Odoo with test database
        run: |
          # Initialize Odoo with test database and install user_delete module
          docker compose --env-file /home/ehbstudent/.env exec -T odoo \
            odoo -d test_db --db_host=db -i user_delete --stop-after-init --no-http

      - name: Run RabbitMQ Consumer Tests with Odoo test runner
        run: |
          docker compose --env-file /home/ehbstudent/.env exec -T odoo \
            odoo -d test_db --db_host=db --test-enable \
                 -u user_delete --test-tags user_delete --stop-after-init --log-level=test
      
      - name: Stop containers
        if: always()
        run: docker compose --env-file /home/ehbstudent/.env down

