name: Odoo CI/CD develop Pipeline

on:
  push:
    branches: [ Feature-Mathis, Feature-Daniel, Feature-Milan, Feature-Jorn, Feature-Jente ]  

jobs:
  build:
    name: Build Odoo
    runs-on: self-hosted 
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load environment variables from .env
        run: export $(grep -v '^#' /home/ehbstudent/.env | xargs)

      - name: Build Docker Image
        run: docker compose --env-file /home/ehbstudent/.env build

      - name: Test Docker Compose
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10
          docker ps
          docker inspect --format='{{json .State.Health}}' $(docker ps -q) | jq
          docker compose down

  test:
    name: Test Odoo
    needs: build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Set up test directory structure
        run: |
          # Create directory structure
          mkdir -p custom-addons/user_delete/tests
          
          # Copy test file from the repository to the test directory
          cp ${{ github.workspace }}/custom-addons/user_delete/tests/test_rabbitmq_consumer.py custom-addons/user_delete/tests/
          
          # Create __init__.py
          echo "from . import test_rabbitmq_consumer" > custom-addons/user_delete/tests/__init__.py
          
          # Display test file for debugging
          echo "Test file contents:"
          cat custom-addons/user_delete/tests/test_rabbitmq_consumer.py
          
      - name: Start containers for testing
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10 # Give time for containers to start

      - name: Create test database
        run: |
          # Access PostgreSQL from inside the db container
          docker compose --env-file /home/ehbstudent/.env exec -T db psql -U odoo -c "DROP DATABASE IF EXISTS test_db;" postgres
          docker compose --env-file /home/ehbstudent/.env exec -T db psql -U odoo -c "CREATE DATABASE test_db OWNER odoo;" postgres
    
      - name: Check if packages are available in container
        run: |
          docker compose --env-file /home/ehbstudent/.env exec -T odoo python3 -c "
          try:
              import lxml
              import mock
              print('✓ Required packages are available')
          except ImportError as e:
              print(f'✗ Package import error: {e}')
              exit(1)
          "

      - name: Create simplified test file
        run: |
          # Create a simplified test file that will work with basic dependencies
          cat > custom-addons/user_delete/tests/simplified_test.py << 'EOF'
          from odoo.tests import common

          class TestUserDeleteSimplified(common.TransactionCase):
              """Simple test cases for the UserDeleteThread class."""
              
              def setUp(self):
                  super().setUp()
              
              def test_module_installed(self):
                  """Test that the user_delete module is installed."""
                  module = self.env['ir.module.module'].search([('name', '=', 'user_delete')])
                  self.assertTrue(module.exists(), "Module user_delete should be installed")
          EOF
          
          # Update __init__.py to include simplified test
          echo "from . import simplified_test" >> custom-addons/user_delete/tests/__init__.py

      - name: Run Odoo tests
        run: |
          docker compose --env-file /home/ehbstudent/.env exec -T odoo \
            odoo --stop-after-init \
                --test-enable \
                --log-level=test \
                --database=test_db \
                --db_host=db \
                --modules=user_delete \
                -i user_delete
                 
      - name: Stop containers
        if: always()
        run: docker compose --env-file /home/ehbstudent/.env down
