name: Odoo CI/CD feature Pipeline

on:
  push:
    branches: [ Feature-Mathis, Feature-Daniel, Feature-Milan, Feature-Jorn, Feature-Jente ]  

jobs:
  build:
    name: Build & Test Odoo
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load environment variables from .env
        run: export $(grep -v '^#' /home/ehbstudent/.env | xargs)

      - name: Build Docker Image
        run: docker compose --env-file /home/ehbstudent/.env build

      - name: Test Docker Compose
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10
          docker ps
          docker inspect --format='{{json .State.Health}}' $(docker ps -q) | jq
          docker compose down

  test:
    name: Run User Delete Tests
    needs: build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start containers for testing
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10  # geef containers tijd om op te starten

      - name: Run RabbitMQ Consumer Tests
        run: |
          docker compose --env-file /home/ehbstudent/.env exec -T odoo bash -c "\
            mkdir -p /mnt/extra-addons/odoo/addons && \
            ln -sf /mnt/extra-addons/user_delete /mnt/extra-addons/odoo/addons/user_delete && \
            python3 -m unittest discover -s /mnt/extra-addons/odoo/addons/user_delete/tests -p 'test_rabbitmq_consumer.py'"
      
      - name: Stop containers
        if: always()
        run: docker compose --env-file /home/ehbstudent/.env down

