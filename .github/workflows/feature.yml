name: Odoo CI/CD feature Pipeline

on:
  push:
    branches: [ Feature-Mathis, Feature-Daniel, Feature-Milan, Feature-Jorn, Feature-Jente ]  

jobs:
  build:
    name: Build Odoo
    runs-on: self-hosted 
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load environment variables from .env
        run: export $(grep -v '^#' /home/ehbstudent/.env | xargs)

      - name: Build Docker Image
        run: docker compose --env-file /home/ehbstudent/.env build

      - name: Test Docker Compose
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10
          docker ps
          docker inspect --format='{{json .State.Health}}' $(docker ps -q) | jq
          docker compose down
