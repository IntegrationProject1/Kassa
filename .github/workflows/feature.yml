name: Odoo CI/CD develop Pipeline

on:
  push:
    branches: [ Feature-Mathis, Feature-Daniel, Feature-Milan, Feature-Jorn, Feature-Jente ]  

jobs:
  build:
    name: Build Odoo
    runs-on: self-hosted 
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load environment variables from .env
        run: export $(grep -v '^#' /home/ehbstudent/.env | xargs)

      - name: Build Docker Image
        run: docker compose --env-file /home/ehbstudent/.env build

      - name: Test Docker Compose
        run: |
          docker compose --env-file /home/ehbstudent/.env up -d
          sleep 10
          docker ps
          docker inspect --format='{{json .State.Health}}' $(docker ps -q) | jq
          docker compose down

  test:
    name: Test Odoo
    needs: build
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ehbstudent/kassa

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Create tests directory structure
        run: |
          mkdir -p custom-addons/user_delete/tests
          echo "from . import test_rabbitmq_consumer" > custom-addons/user_delete/tests/__init__.py

      - name: Create test database
        run: |
          docker compose --env-file /home/ehbstudent/.env run --rm db psql -U odoo -c "DROP DATABASE IF EXISTS test_db;" postgres
          docker compose --env-file /home/ehbstudent/.env run --rm db psql -U odoo -c "CREATE DATABASE test_db OWNER odoo;" postgres
    
      - name: Run unit tests in Docker container
        run: |
          docker compose --env-file /home/ehbstudent/.env run --rm \
            -e TEST_ENABLE=True \
            odoo \
            odoo --stop-after-init \
                 --test-enable \
                 --log-level=test \
                 --database=test_db \
                 --db_host=db \
                 --init=user_delete \
                 --test-tags=user_delete
