services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    ports:
      - "30060:5432"
    networks:
      - project_network
    restart: always
 
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    user: root
    depends_on:
      - db
    ports:
      - "30069:8069"
    volumes:
      - ./custom-addons:/mnt/extra-addons
      - ./config:/etc/odoo
      - odoo-web-data:/var/lib/odoo/web/static
      - /data/odoo-data:/var/lib/odoo
    environment:
      - HOST=${ODOO_HOST}
      - USER=${ODOO_USER}
      - PASSWORD=${ODOO_PASSWORD}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}  # Use internal port
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    networks:
      - project_network
      - rabbitmq_network  # Add shared network
    restart: always
 
volumes:
  odoo-web-data:
    driver: local
 
networks:
  project_network:
    name: odoo_project_network  # Explicit name
    driver: bridge
  rabbitmq_network:
    external: true  # This network must be created manually
    name: rabbit_project_network